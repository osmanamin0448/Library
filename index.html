<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library Project.</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="logo">
      <img class="logo-image" src="img/odin-logo.png" alt="">
      <h1>Odin Library</h1>
    </div>
      <button class="add-book">Add Book</button>
  </header>

  <div class="main-container">
    <div>
      <img class="library-image" src="img/peter-herrmann-aT88kga0g_M-unsplash.jpg" alt="library image">
    </div>

    <div id="library"></div>

    <dialog id="dialog">
      <form id="book-form">
        <div>
          <label for="title">Title *</label>
          <input type="text" name="title" id="title" required>
        </div>

        <div>
          <label for="author">Author *</label>
          <input type="text" name="author" id="author" required>
        </div>

        <div>
          <label for="pages">number of pages *</label>
          <input type="number" name="pages" id="pages" required>
        </div>

        <div id="checkbox">
          <label for="read">Have you read this book?</label>
          <input type="checkbox" id="read" name="read" >
        </div>

        <div class="buttons-div">
          <button id="add-button" type="submit">add book</button>
          <button id="cancel-button" type="button">Cancel</button>
        </div>
      </form> 
    </dialog>

    
  </div>   

  <footer>
    Copyright 2026 by Osman Amin
  </footer>


  <script src="script.js"></script>
</body>
</html>
